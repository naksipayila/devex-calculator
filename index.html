<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevEx Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="app-container">
        <div class="card-container">
            <div class="card-inner">
                <header class="tool-header">
                    <div>
                        <p class="tool-eyebrow">DevEx</p>
                        <h1 class="tool-title">Calculator</h1>
                    </div>
                    <div class="header-buttons">
                        <button class="header-icon-btn" id="openInfoBtn" title="How to use" aria-label="How to use">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        </button>
                        <button class="header-icon-btn" id="openTaxBtn" title="Tax Calculator" aria-label="Tax Calculator">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><path d="M8 10h.01"></path><path d="M12 10h.01"></path><path d="M16 10h.01"></path><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>
                        </button>
                    </div>
                </header>

                <main class="interaction-area">
                    <section class="input-section">
                        <div class="input-wrapper" id="inputWrapper">
                            <div class="input-heading">
                                <label class="input-label" id="inputLabel">Robux</label>
                            </div>

                            <div class="input-value-row">
                                <div class="input-prefix" id="inputPrefix">
                                    <span class="prefix-robux">R$</span>
                                </div>
                                <input type="text" id="mainInput" placeholder="0" autocomplete="off" inputmode="numeric" />
                            </div>

                            <button class="control-btn clear-btn" id="clearBtn" title="Clear" aria-label="Clear">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </section>

                    <div class="quick-grid" id="quickGrid"></div>

                    <section class="summary-panel" aria-label="Conversion summary">
                        <article class="summary-row summary-row-primary summary-row-copyable">
                            <div class="summary-heading">
                                <span>USD</span>
                            </div>
                            <div class="summary-usd-input-wrapper" id="summaryUsdWrapper">
                                <span class="summary-usd-prefix">$</span>
                                <input type="text" id="summaryUsdInput" value="0.00" autocomplete="off" inputmode="decimal" aria-label="USD Amount" />
                            </div>
                        </article>

                        <article class="summary-row">
                            <span>TRY</span>
                            <strong id="summaryTry">0,00 ₺</strong>
                        </article>
                    </section>

                    <section class="rate-panel" aria-label="Rate information">
                        <div class="rate-devex-row">
                            <span class="devex-chip">1 R$ = $0.0038</span>
                        </div>
                        <div class="rate-exchange-row">
                            <span>1 USD =</span>
                            <input type="number" step="0.01" id="tryRateInput" class="inline-rate-input" value="46.00">
                            <span>TRY</span>
                            <button class="refresh-rate-btn" id="refreshRateBtn" title="Refresh Rate" aria-label="Refresh Rate">
                                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                            </button>
                        </div>
                    </section>
                </main>
            </div>
        </div>

    </div>

    <div class="drawer-overlay" id="taxDrawer">
        <div class="drawer-content">
            <div class="drawer-header">
                <h3 class="drawer-title">Roblox Tax Calculator</h3>
                <button class="drawer-close-btn" id="closeTaxBtn" title="Close" aria-label="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <div class="drawer-body">
                <div class="tax-input-group">
                    <label class="tax-label">Net Robux (Amount Received)</label>
                    <div class="tax-input-wrapper">
                        <span class="tax-prefix">R$</span>
                        <input type="text" id="netRobuxInput" placeholder="0">
                    </div>
                </div>

                <div class="tax-input-group">
                    <label class="tax-label">Gross Robux (Sale Price / Gamepass Price)</label>
                    <div class="tax-input-wrapper">
                        <span class="tax-prefix">R$</span>
                        <input type="text" id="grossRobuxInput" placeholder="0">
                        <button class="tax-copy-btn" id="grossCopyBtn" title="Copy" aria-label="Copy Gross Robux">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="tax-info-box">
                    <div class="tax-info-row">
                        <span>Roblox Fee (30%):</span>
                        <span id="taxAmountDisplay">0 R$</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="drawer-overlay" id="infoDrawer">
        <div class="drawer-content">
            <div class="drawer-header">
                <h3 class="drawer-title">How to Use</h3>
                <button class="drawer-close-btn" id="closeInfoBtn" title="Close" aria-label="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="drawer-body drawer-info-body">
                <div class="info-section">
                    <span class="info-section-label">Desktop</span>
                    <div class="info-item">
                        <span class="info-icon">1</span>
                        <span>Click quick button = add amount.</span>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">2</span>
                        <span>Right&#8209;click quick button = add double.</span>
                    </div>
                </div>
                <div class="info-section">
                    <span class="info-section-label">Mobile</span>
                    <div class="info-item">
                        <span class="info-icon">1</span>
                        <span>Tap quick button = add amount.</span>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">2</span>
                        <span>Swipe right on quick button = add double.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
</body>
</html>
